name: Plan Mensual Automatico

on:
  schedule:
    - cron: '0 20 28-31 * *'
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mes (ej: agosto)'
        required: true
        default: 'agosto'
      anyo:
        description: 'Anyo (ej: 2026)'
        required: true
        default: '2026'

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Ejecutar script generador
        run: python3 .github/scripts/generar_plan.py ${{ github.event.inputs.mes }} ${{ github.event.inputs.anyo }}

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add planes/ metricas/
          git diff --staged --quiet || git commit -m "Auto: Plan ${{ github.event.inputs.mes }} ${{ github.event.inputs.anyo }}"
          git push

      - name: Crear issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nuevo plan listo: ${{ github.event.inputs.mes }} ${{ github.event.inputs.anyo }}',
              body: '## Plan generado\n\n- [ ] Revisar objetivos\n- [ ] Ajustar distribucion semanal\n- [ ] Verificar HRV y fatiga\n- [ ] Planificar semana de descarga si necesario'
            })
