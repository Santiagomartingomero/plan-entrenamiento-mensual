name: Recordatorio Semanal de Entrenamiento

on:
  schedule:
    # Cada lunes a las 6:00 AM UTC
    # Verano (WEST = UTC+1): 7:00 AM · Invierno (WET = UTC+0): 6:00 AM
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  recordatorio:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear issue de seguimiento semanal
        uses: actions/github-script@v7
        with:
          script: |
            const hoy = new Date();
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Atlantic/Canary' };
            const fechaStr = hoy.toLocaleDateString('es-ES', opciones);

            // Calcular semana del mes (1-4)
            const diaMes = hoy.getDate();
            const semana = Math.min(Math.ceil(diaMes / 7), 4);
            const esSemanaDescarga = semana === 4;

            const alertaDescarga = esSemanaDescarga
              ? '\n> ⚡ **SEMANA DE DESCARGA** — Reduce volumen -40% e intensidad -20%. La supercompensación ocurre ahora.\n'
              : '';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🗓️ Semana ${semana}/4 — ${fechaStr}`,
              body: `### Checklist semanal\n${alertaDescarga}\n- [ ] Registrar sesiones completadas en \`registros/\`\n- [ ] Actualizar métricas CSV (FC, RPE, HRV)\n- [ ] Revisar HRV: si baja >10% respecto basal → reducir intensidad\n- [ ] Valorar recuperación subjetiva (1-10)\n- [ ] Ajustar plan si hay guardias, viajes o fatiga acumulada\n\n**Zona horaria:** Atlantic/Canary (Islas Canarias)\n\n> Generado automáticamente cada lunes.`
            });
