name: 📋 Recordatorio Semanal de Entrenamiento

on:
  schedule:
    # Cada lunes a las 7:00 AM UTC (9:00 AM hora Canarias en verano)
    - cron: '0 7 * * 1'
  workflow_dispatch: # Permite ejecución manual

jobs:
  recordatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar resumen semanal
        run: |
          SEMANA=$(date +"%Y-W%V")
          echo "## 🏋️ Recordatorio — Semana $SEMANA" >> resumen_semana.md
          echo "Actualiza tu registro en registros/ y revisa el plan del mes en planes/" >> resumen_semana.md
          echo "Fecha de generación: $(date)" >> resumen_semana.md

      - name: Crear issue de seguimiento semanal
        uses: actions/github-script@v7
        with:
          script: |
            const semana = new Date().toLocaleDateString('es-ES', { year: 'numeric', week: 'numeric' });
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🗓️ Seguimiento semana del ${new Date().toLocaleDateString('es-ES')}`,
              body: `### Checklist semanal de entrenamiento\n\n- [ ] Actualizar registros de sesiones\n- [ ] Revisar métricas CSV\n- [ ] Ajustar plan si necesario\n- [ ] Valorar recuperación y HRV\n\n> Generado automáticamente cada lunes.`,
              labels: []
            });
